<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRR Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#F8FAFC;color:#1E293B}
    #root{min-height:100vh}
    @keyframes spin{to{transform:rotate(360deg)}}
    button:active{opacity:0.7}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script>
const e = React.createElement;
const CLIENT_ID = "610736844681-t0p32thbogua2rtuvn7niavpnnukjbd3.apps.googleusercontent.com";
const FILE_NAME = "rrr_project_tasks.json";
const SCOPES = "https://www.googleapis.com/auth/drive.file";
const COLORS = ["#2563EB","#16A34A","#DC2626","#D97706","#7C3AED","#0891B2","#DB2777","#65A30D","#EA580C","#4F46E5"];
function uid(){ return Math.random().toString(36).slice(2,10); }
function today(){ return new Date().toISOString().slice(0,10); }
function nowTs(){ return Date.now(); }

const DEMO = {
  projects:[
    {id:"p1",name:"SRFR Station 71 Trailer Remodel",color:"#2563EB",createdAt:today(),order:0,archived:false},
    {id:"p2",name:"Trailer Roof Refinishing",color:"#16A34A",createdAt:today(),order:1,archived:false}
  ],
  tasks:[
    {id:"t1",projectId:"p1",text:"Finalize cover page dates with client",priority:true,done:false,notes:"",createdAt:today(),order:0,priorityOrder:0,completedAt:null},
    {id:"t2",projectId:"p1",text:"Submit permit application",priority:false,done:false,notes:"",createdAt:today(),order:1,priorityOrder:0,completedAt:null},
    {id:"t3",projectId:"p1",text:"Order interior materials",priority:false,done:false,notes:"",createdAt:today(),order:2,priorityOrder:0,completedAt:null},
    {id:"t4",projectId:"p2",text:"Apply first coat RX-985 silicone coating",priority:true,done:false,notes:"Use 3/4 nap roller",createdAt:today(),order:0,priorityOrder:1,completedAt:null},
    {id:"t5",projectId:"p2",text:"Wire cup scrub remaining rust spots",priority:false,done:false,notes:"",createdAt:today(),order:1,priorityOrder:0,completedAt:null}
  ]
};

function App(){
  const [data,setData] = React.useState(null);
  const [view,setView] = React.useState("week");
  const [gapiReady,setGapiReady] = React.useState(false);
  const [signedIn,setSignedIn] = React.useState(false);
  const [syncStatus,setSyncStatus] = React.useState("idle");
  const [modalTask,setModalTask] = React.useState(null);
  const [showAddProject,setShowAddProject] = React.useState(false);
  const [newProjectName,setNewProjectName] = React.useState("");
  const [showImport,setShowImport] = React.useState(false);
  const [importText,setImportText] = React.useState("");
  const [importProjectName,setImportProjectName] = React.useState("");
  const [editingProjectId,setEditingProjectId] = React.useState(null);
  const [editingProjectName,setEditingProjectName] = React.useState("");
  const [showArchived,setShowArchived] = React.useState(false);
  const [undoStack,setUndoStack] = React.useState([]);
  const [userHandle,setUserHandle] = React.useState("");
  const fileIdRef = React.useRef(null);
  const saveTimer = React.useRef(null);
  const tokenClient = React.useRef(null);

  // ── Google init ──────────────────────────────────────────────────────────
  React.useEffect(()=>{
    function initGapi(){ window.gapi.load("client",async()=>{ await window.gapi.client.init({}); trySavedToken(); }); }
    function trySavedToken(){
      const saved = localStorage.getItem("rrr_token");
      const savedExp = parseInt(localStorage.getItem("rrr_token_exp")||"0",10);
      if(saved && Date.now() < savedExp){
        window.gapi.client.setToken({access_token:saved});
        const cachedEmail = localStorage.getItem("rrr_email");
        if(cachedEmail) setUserHandle(cachedEmail.split("@")[0]);
        setSignedIn(true); loadFromDrive(); return true;
      }
      return false;
    }
    function initGoogle(){
      tokenClient.current = window.google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID, scope:SCOPES,
        hint: localStorage.getItem("rrr_email")||undefined,
        callback:(resp)=>{
          if(resp.error){console.error(resp);return;}
          localStorage.setItem("rrr_was_signed_in","true");
          localStorage.setItem("rrr_token",resp.access_token);
          localStorage.setItem("rrr_token_exp", String(Date.now() + (resp.expires_in||3600)*1000 - 60000));
          // Decode email from id_token if present (instant, no network call needed)
          try{
            if(resp.id_token){
              const payload = JSON.parse(atob(resp.id_token.split(".")[1]));
              if(payload.email){
                localStorage.setItem("rrr_email",payload.email);
                setUserHandle(payload.email.split("@")[0]);
              }
            }
          }catch(ex){}
          // Fallback: fetch userinfo if id_token not present
          if(!localStorage.getItem("rrr_email")){
            fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+resp.access_token}})
              .then(r=>r.json()).then(info=>{
                if(info.email){
                  localStorage.setItem("rrr_email",info.email);
                  setUserHandle(info.email.split("@")[0]);
                }
              }).catch(()=>{});
          }
          setSignedIn(true); loadFromDrive();
        }
      });
      setGapiReady(true);
      if(!trySavedToken() && localStorage.getItem("rrr_was_signed_in")==="true"){
        tokenClient.current.requestAccessToken({prompt:""});
      }
    }
    const interval = setInterval(()=>{
      if(window.gapi && !window.gapi.client){ initGapi(); }
      if(window.gapi && window.gapi.client && window.google && window.google.accounts){ clearInterval(interval); initGoogle(); }
    },200);
    return ()=>clearInterval(interval);
  },[]);

  // ── Drive ────────────────────────────────────────────────────────────────
  async function findFile(){
    const res = await window.gapi.client.request({path:"https://www.googleapis.com/drive/v3/files",params:{q:`name='${FILE_NAME}' and trashed=false`,fields:"files(id)"}});
    return res.result.files?.[0]?.id||null;
  }
  async function loadFromDrive(){
    try{
      setSyncStatus("saving");
      const id = await findFile();
      if(!id){ setData(DEMO); await createDriveFile(DEMO); setSyncStatus("saved"); return; }
      fileIdRef.current=id;
      const res = await window.gapi.client.request({path:`https://www.googleapis.com/drive/v3/files/${id}`,params:{alt:"media"}});
      const parsed = typeof res.result==="string"?JSON.parse(res.result):res.result;
      setData(parsed); setSyncStatus("saved");
    }catch(err){ console.error(err); setSyncStatus("error"); setData(DEMO); }
  }
  async function createDriveFile(payload){
    const b="rrr_boundary";
    const body=[`--${b}`,"Content-Type: application/json; charset=UTF-8","",JSON.stringify({name:FILE_NAME,mimeType:"application/json"}),`--${b}`,"Content-Type: application/json","",JSON.stringify(payload),`--${b}--`].join("\r\n");
    const res = await window.gapi.client.request({path:"https://www.googleapis.com/upload/drive/v3/files",method:"POST",params:{uploadType:"multipart"},headers:{"Content-Type":`multipart/related; boundary=${b}`},body});
    fileIdRef.current=res.result.id;
  }
  async function saveDriveFile(payload){
    const id=fileIdRef.current||await findFile();
    if(!id){await createDriveFile(payload);return;}
    fileIdRef.current=id;
    await window.gapi.client.request({path:`https://www.googleapis.com/upload/drive/v3/files/${id}`,method:"PATCH",params:{uploadType:"media"},headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  }
  function updateData(fn){
    setData(prev=>{
      // Save to undo stack before applying change
      setUndoStack(stack=>[prev,...stack.slice(0,19)]);
      const next=fn(prev);
      if(signedIn){ clearTimeout(saveTimer.current); setSyncStatus("saving"); saveTimer.current=setTimeout(async()=>{ try{await saveDriveFile(next);setSyncStatus("saved");}catch(err){console.error(err);setSyncStatus("error");} },1200); }
      return next;
    });
  }
  function undo(){
    setUndoStack(stack=>{
      if(stack.length===0)return stack;
      const [prev,...rest] = stack;
      setData(prev);
      if(signedIn){ clearTimeout(saveTimer.current); setSyncStatus("saving"); saveTimer.current=setTimeout(async()=>{ try{await saveDriveFile(prev);setSyncStatus("saved");}catch(err){console.error(err);setSyncStatus("error");} },1200); }
      return rest;
    });
  }

  // ── CRUD ─────────────────────────────────────────────────────────────────
  function addTask(projectId,text,asPriority=false){
    if(!text.trim()||!projectId)return;
    updateData(d=>{
      const maxOrder = Math.max(-1,...d.tasks.filter(t=>t.projectId===projectId).map(t=>t.order||0));
      const maxPriOrder = Math.max(-1,...d.tasks.filter(t=>t.priority&&!t.done).map(t=>t.priorityOrder||0));
      return {...d,tasks:[...d.tasks,{id:uid(),projectId,text:text.trim(),priority:asPriority,done:false,notes:"",createdAt:today(),order:maxOrder+1,priorityOrder:asPriority?maxPriOrder+1:0,completedAt:null}]};
    });
  }
  function toggleDone(id){
    updateData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,done:!t.done,completedAt:t.done?null:nowTs()}:t)}));
  }
  function togglePriority(id){
    updateData(d=>{
      const t = d.tasks.find(x=>x.id===id);
      if(!t)return d;
      if(!t.priority){
        const maxPriOrder = Math.max(-1,...d.tasks.filter(x=>x.priority&&!x.done).map(x=>x.priorityOrder||0));
        return {...d,tasks:d.tasks.map(x=>x.id===id?{...x,priority:true,priorityOrder:maxPriOrder+1}:x)};
      }
      return {...d,tasks:d.tasks.map(x=>x.id===id?{...x,priority:false}:x)};
    });
  }
  function reorderProjects(newOrderIds){
    updateData(d=>({...d,projects:d.projects.map(p=>({...p,order:newOrderIds.indexOf(p.id)}))}));
  }
  function reorderProjectTasks(projectId,newOrderIds){
    updateData(d=>{
      let tasks = d.tasks.map(t=>t.projectId===projectId?{...t,order:newOrderIds.indexOf(t.id)}:t);
      const priorityTasksHere = newOrderIds.map(id=>tasks.find(t=>t.id===id)).filter(t=>t&&t.priority&&!t.done);
      if(priorityTasksHere.length>1){
        const allPriority = tasks.filter(t=>t.priority&&!t.done).sort((a,b)=>(a.priorityOrder||0)-(b.priorityOrder||0));
        const withoutThisProject = allPriority.filter(t=>t.projectId!==projectId);
        const insertAt = allPriority.findIndex(t=>t.projectId===projectId);
        const merged = [...withoutThisProject];
        merged.splice(insertAt<0?merged.length:insertAt,0,...priorityTasksHere);
        merged.forEach((t,idx)=>{ tasks = tasks.map(x=>x.id===t.id?{...x,priorityOrder:idx}:x); });
      }
      return {...d,tasks};
    });
  }
  function reorderFrontBurner(newOrderIds){
    updateData(d=>{
      let tasks = d.tasks.map(t=>newOrderIds.includes(t.id)?{...t,priorityOrder:newOrderIds.indexOf(t.id)}:t);
      const touchedProjectIds = new Set(newOrderIds.map(id=>tasks.find(t=>t.id===id)?.projectId).filter(Boolean));
      touchedProjectIds.forEach(pid=>{
        const projTasks = tasks.filter(t=>t.projectId===pid).sort((a,b)=>(a.order||0)-(b.order||0));
        const priorityIdsInThisProject = newOrderIds.filter(id=>{ const t=tasks.find(x=>x.id===id); return t&&t.projectId===pid; });
        const nonPriorityTasks = projTasks.filter(t=>!priorityIdsInThisProject.includes(t.id));
        const originalIndices = priorityIdsInThisProject.map(id=>projTasks.findIndex(t=>t.id===id));
        const insertAt = Math.min(...originalIndices);
        const merged = [...nonPriorityTasks];
        merged.splice(insertAt,0,...priorityIdsInThisProject.map(id=>projTasks.find(t=>t.id===id)));
        merged.forEach((t,idx)=>{ tasks = tasks.map(x=>x.id===t.id?{...x,order:idx}:x); });
      });
      return {...d,tasks};
    });
  }
  function saveTask(updated){ updateData(d=>({...d,tasks:d.tasks.map(t=>t.id===updated.id?updated:t)})); }
  function deleteTask(id){ updateData(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id)})); setModalTask(null); }
  function addProject(name){
    if(!name.trim())return;
    const maxOrder = Math.max(-1,...data.projects.map(p=>p.order||0));
    const p={id:uid(),name:name.trim(),color:COLORS[data.projects.length%COLORS.length],createdAt:today(),order:maxOrder+1,archived:false};
    updateData(d=>({...d,projects:[...d.projects,p]}));
    setShowAddProject(false); setNewProjectName(""); setView(p.id);
  }
  function deleteProject(id){
    updateData(d=>({projects:d.projects.filter(p=>p.id!==id),tasks:d.tasks.filter(t=>t.projectId!==id)}));
    setView("projects");
  }
  function archiveProject(id){
    updateData(d=>({...d,projects:d.projects.map(p=>p.id===id?{...p,archived:true}:p)}));
    setView("projects");
  }
  function unarchiveProject(id){
    updateData(d=>({...d,projects:d.projects.map(p=>p.id===id?{...p,archived:false}:p)}));
  }
  function renameProject(id,name){
    if(!name.trim())return;
    updateData(d=>({...d,projects:d.projects.map(p=>p.id===id?{...p,name:name.trim()}:p)}));
    setEditingProjectId(null); setEditingProjectName("");
  }
  function importTasks(projectName,text){
    if(!text.trim())return;
    const lines = text.split("\n").map(l=>l.trim()).filter(l=>l.length>0);
    updateData(d=>{
      let projects = d.projects;
      let proj = projects.find(p=>p.name.toLowerCase()===projectName.trim().toLowerCase());
      if(!proj && projectName.trim()){
        const maxOrder = Math.max(-1,...projects.map(p=>p.order||0));
        proj = {id:uid(),name:projectName.trim(),color:COLORS[projects.length%COLORS.length],createdAt:today(),order:maxOrder+1,archived:false};
        projects = [...projects,proj];
      }
      if(!proj) return d;
      const baseOrder = Math.max(-1,...d.tasks.filter(t=>t.projectId===proj.id).map(t=>t.order||0))+1;
      const maxPriOrder = Math.max(-1,...d.tasks.filter(x=>x.priority&&!x.done).map(x=>x.priorityOrder||0));
      let priCounter = maxPriOrder;
      const newTasks = lines.map((line,i)=>{
        let clean = line.replace(/^[-*]\s*\[\s*[xX]?\s*\]\s*/,"").replace(/^[-*•]\s*/,"").trim();
        const isPriority = /\(priority\)|★|\*priority\*/i.test(clean);
        clean = clean.replace(/\(priority\)|★|\*priority\*/gi,"").trim();
        if(isPriority) priCounter++;
        return {id:uid(),projectId:proj.id,text:clean,priority:isPriority,done:false,notes:"",createdAt:today(),order:baseOrder+i,priorityOrder:isPriority?priCounter:0,completedAt:null};
      }).filter(t=>t.text.length>0);
      return {projects,tasks:[...d.tasks,...newTasks]};
    });
    setShowImport(false); setImportText(""); setImportProjectName("");
  }

  const projectMap = data?Object.fromEntries(data.projects.map(p=>[p.id,p])):{};
  const syncColor={idle:"#94A3B8",saving:"#F59E0B",saved:"#16A34A",error:"#DC2626"}[syncStatus];
  const syncLabel={idle:"",saving:"Saving…",saved:"Saved ✓",error:"Save failed"}[syncStatus];
  const displayHandle = userHandle || (localStorage.getItem("rrr_email")||"").split("@")[0];

  // ── Sign in screen ───────────────────────────────────────────────────────
  if(!signedIn){
    return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F8FAFC",padding:20}},
      e("div",{style:{background:"#fff",borderRadius:16,padding:40,width:"100%",maxWidth:340,boxShadow:"0 8px 40px rgba(0,0,0,.1)",display:"flex",flexDirection:"column",alignItems:"center"}},
        e("div",{style:{fontSize:28,fontWeight:900,color:"#2563EB",letterSpacing:2,marginBottom:8}},"RRR"),
        e("h1",{style:{fontSize:20,fontWeight:700,margin:"0 0 4px",textAlign:"center"}},"Project Task Manager"),
        e("p",{style:{fontSize:13,color:"#64748B",margin:"0 0 20px",textAlign:"center"}},"Renewal Remodeling & Repairs"),
        e("button",{
          style:{display:"flex",alignItems:"center",padding:"12px 24px",background:"#fff",border:"1px solid #E2E8F0",borderRadius:8,fontSize:15,fontWeight:500,cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,.08)"},
          onClick:()=>gapiReady&&tokenClient.current&&tokenClient.current.requestAccessToken()
        },
          e("svg",{width:20,height:20,viewBox:"0 0 18 18",style:{marginRight:10}},
            e("path",{fill:"#4285F4",d:"M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"}),
            e("path",{fill:"#34A853",d:"M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"}),
            e("path",{fill:"#FBBC05",d:"M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"}),
            e("path",{fill:"#EA4335",d:"M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"})
          ),
          "Sign in with Google"
        ),
        e("p",{style:{fontSize:11,color:"#94A3B8",marginTop:16}},"michaeltatham1@gmail.com")
      )
    );
  }
  if(!data){ return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}},"Loading…"); }

  // ── Task row ─────────────────────────────────────────────────────────────
  function TaskRow({task,showProjectName=false,arrowControls=null}){
    const proj = projectMap[task.projectId];
    return e("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"#fff",borderRadius:8,border:"1px solid #E2E8F0",marginBottom:4,opacity:task.done?0.45:1}},
      arrowControls,
      e("div",{style:{flex:1,minWidth:0,cursor:"pointer"},onClick:()=>setModalTask({...task})},
        e("div",{style:{fontSize:15,color:"#1E293B",lineHeight:1.4,textDecoration:task.done?"line-through":"none"}},
          task.text,
          showProjectName&&proj&&e("span",{style:{color:"#94A3B8",fontWeight:400,fontSize:13}}," ("+proj.name+")")
        ),
        task.notes&&e("div",{style:{fontSize:12,color:"#64748B",marginTop:2}},task.notes)
      ),
      e("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:20,padding:"0 4px",flexShrink:0,color:task.priority?"#F59E0B":"#CBD5E1",lineHeight:1},onClick:(ev)=>{ev.stopPropagation();togglePriority(task.id);}},"★"),
      e("button",{style:{background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0},onClick:(ev)=>{ev.stopPropagation();toggleDone(task.id);}},
        e("div",{style:{width:20,height:20,borderRadius:4,border:`2px solid ${task.done?"#2563EB":"#CBD5E1"}`,background:task.done?"#2563EB":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}},
          task.done&&e("svg",{width:11,height:9,viewBox:"0 0 10 8"},e("path",{d:"M1 4l3 3 5-6",stroke:"#fff",strokeWidth:1.8,fill:"none",strokeLinecap:"round",strokeLinejoin:"round"}))
        )
      )
    );
  }

  // ── Reorder list with ▲▼ T B buttons ────────────────────────────────────
  function DragList({items,getId,onReorder,renderItem}){
    function move(idx,dir){
      const newIdx=idx+dir;
      if(newIdx<0||newIdx>=items.length)return;
      const ids=items.map(getId);
      const tmp=ids[idx]; ids[idx]=ids[newIdx]; ids[newIdx]=tmp;
      onReorder(ids);
    }
    function moveToTop(idx){
      if(idx===0)return;
      const ids=items.map(getId);
      const [item]=ids.splice(idx,1);
      ids.unshift(item);
      onReorder(ids);
    }
    function moveToBottom(idx){
      if(idx===items.length-1)return;
      const ids=items.map(getId);
      const [item]=ids.splice(idx,1);
      ids.push(item);
      onReorder(ids);
    }
    return e("div",null, items.map((item,idx)=>{
      const id=getId(item);
      const n=items.length;
      const btnStyle=(disabled)=>({background:"#F1F5F9",border:"none",borderRadius:4,width:22,height:18,cursor:disabled?"default":"pointer",color:disabled?"#CBD5E1":"#475569",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",padding:0,fontWeight:600});
      const arrowControls = e("div",{style:{display:"flex",flexDirection:"column",gap:2,flexShrink:0}},
        e("div",{style:{display:"flex",gap:2}},
          e("button",{style:btnStyle(idx===0),disabled:idx===0,onClick:(ev)=>{ev.stopPropagation();moveToTop(idx);}},"T"),
          e("button",{style:btnStyle(idx===0),disabled:idx===0,onClick:(ev)=>{ev.stopPropagation();move(idx,-1);}},"▲")
        ),
        e("div",{style:{display:"flex",gap:2}},
          e("button",{style:btnStyle(idx===n-1),disabled:idx===n-1,onClick:(ev)=>{ev.stopPropagation();move(idx,1);}},"▼"),
          e("button",{style:btnStyle(idx===n-1),disabled:idx===n-1,onClick:(ev)=>{ev.stopPropagation();moveToBottom(idx);}},"B")
        )
      );
      return e("div",{key:id},renderItem(item,arrowControls));
    }));
  }

  // ── Add task bar ─────────────────────────────────────────────────────────
  function AddTaskBar({projectId,asPriority=false}){
    const [text,setText]=React.useState("");
    const [selProj,setSelProj]=React.useState(projectId||data.projects[0]?.id||"");
    function submit(){ if(!text.trim())return; addTask(asPriority?selProj:projectId,text,asPriority); setText(""); }
    return e("div",{style:{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}},
      asPriority&&e("select",{style:{padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:14,background:"#fff",color:"#334155",maxWidth:200},value:selProj,onChange:ev=>setSelProj(ev.target.value)},
        data.projects.filter(p=>!p.archived).map(p=>e("option",{key:p.id,value:p.id},p.name))
      ),
      e("input",{style:{flex:1,minWidth:160,padding:"10px 12px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,background:"#fff",outline:"none"},placeholder:"Add task…",value:text,onChange:ev=>setText(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&submit()}),
      e("button",{style:{padding:"10px 16px",borderRadius:8,background:"#2563EB",color:"#fff",border:"none",fontSize:14,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"},onClick:submit},"+ Add")
    );
  }

  // ── Top nav ──────────────────────────────────────────────────────────────
  const priorityCount = data.tasks.filter(t=>t.priority&&!t.done).length;
  const isProjectView = view!=="week"&&view!=="projects";
  const topNav = e("div",{style:{background:"#0F172A",padding:"0 12px",display:"flex",alignItems:"center",gap:4,position:"sticky",top:0,zIndex:10}},
    displayHandle&&e("span",{style:{color:"#2563EB",fontSize:13,fontWeight:700,letterSpacing:.5,marginRight:4,flexShrink:0}},displayHandle),
    e("button",{style:{padding:"14px 14px",border:"none",background:"transparent",color:view==="week"?"#fff":"#64748B",fontSize:14,fontWeight:view==="week"?700:400,cursor:"pointer",borderBottom:view==="week"?"2px solid #2563EB":"2px solid transparent"},onClick:()=>setView("week")},
      "★ Front Burner"+(priorityCount>0?" ("+priorityCount+")":"")
    ),
    e("button",{style:{padding:"14px 14px",border:"none",background:"transparent",color:(view==="projects"||isProjectView)?"#fff":"#64748B",fontSize:14,fontWeight:(view==="projects"||isProjectView)?700:400,cursor:"pointer",borderBottom:(view==="projects"||isProjectView)?"2px solid #2563EB":"2px solid transparent"},onClick:()=>setView("projects")},
      "Projects"
    ),
    e("div",{style:{flex:1}}),
    undoStack.length>0&&e("button",{
      style:{background:"none",border:"none",cursor:"pointer",color:"#64748B",fontSize:18,padding:"0 8px",lineHeight:1},
      onClick:undo, title:"Undo last action"
    },"↩"),
    e("span",{style:{fontSize:11,color:syncColor,marginLeft:4}},syncLabel)
  );

  // ── Front Burner view ────────────────────────────────────────────────────
  let mainContent;
  if(view==="week"){
    const priorityTasks = data.tasks.filter(t=>t.priority&&!t.done).sort((a,b)=>(a.priorityOrder||0)-(b.priorityOrder||0));
    const projectsInUse = new Set(priorityTasks.map(t=>t.projectId)).size;
    const completedTasks = data.tasks.filter(t=>t.done).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));

    mainContent = e("div",{style:{padding:"16px"}},
      e("h2",{style:{fontSize:20,fontWeight:700,color:"#0F172A",marginBottom:4}},"Front Burner"),
      e("p",{style:{fontSize:13,color:"#64748B",marginBottom:16}},priorityCount+" priority task"+(priorityCount!==1?"s":"")+" across "+projectsInUse+" project"+(projectsInUse!==1?"s":"")),
      e("div",{style:{marginBottom:20,paddingBottom:16,borderBottom:"1px solid #E2E8F0"}},
        e("p",{style:{fontSize:12,color:"#94A3B8",marginBottom:6}},"Add a Front Burner task to a project:"),
        e(AddTaskBar,{asPriority:true})
      ),
      priorityCount===0&&e("div",{style:{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}},
        e("div",{style:{fontSize:40,marginBottom:12}},"★"),
        e("p",{style:{fontSize:15}},"No priority tasks yet."),
        e("p",{style:{fontSize:13,marginTop:6}},"Star any task to add it here.")
      ),
      e(DragList,{items:priorityTasks,getId:t=>t.id,onReorder:reorderFrontBurner,renderItem:(t,ac)=>e(TaskRow,{key:t.id,task:t,showProjectName:true,arrowControls:ac})}),
      completedTasks.length>0&&e("details",{style:{marginTop:24}},
        e("summary",{style:{fontSize:13,color:"#94A3B8",cursor:"pointer",padding:"8px 0",fontWeight:600}},"✓ All Completed Tasks ("+completedTasks.length+")"),
        e("div",{style:{marginTop:8}},
          completedTasks.map(t=>{
            const proj=projectMap[t.projectId];
            const completedDate = t.completedAt ? new Date(t.completedAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "";
            return e("div",{key:t.id,style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#fff",borderRadius:8,border:"1px solid #E2E8F0",marginBottom:4,opacity:0.6}},
              e("div",{style:{width:16,height:16,borderRadius:4,background:"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                e("svg",{width:9,height:7,viewBox:"0 0 10 8"},e("path",{d:"M1 4l3 3 5-6",stroke:"#fff",strokeWidth:1.8,fill:"none",strokeLinecap:"round",strokeLinejoin:"round"}))
              ),
              e("div",{style:{flex:1,minWidth:0}},
                e("div",{style:{fontSize:14,color:"#475569",textDecoration:"line-through"}},t.text),
                e("div",{style:{fontSize:11,color:"#94A3B8",marginTop:1}},
                  (proj?proj.name:"")+(completedDate?" · "+completedDate:"")
                )
              )
            );
          })
        )
      )
    );

  // ── Projects list view ───────────────────────────────────────────────────
  } else if(view==="projects"){
    const activeProjects = [...data.projects].filter(p=>!p.archived).sort((a,b)=>(a.order||0)-(b.order||0));
    const archivedProjects = data.projects.filter(p=>p.archived);

    mainContent = e("div",{style:{padding:"16px"}},
      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:8}},
        e("h2",{style:{fontSize:20,fontWeight:700,color:"#0F172A"}},"Projects"),
        e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          e("button",{style:{padding:"8px 12px",background:"#F1F5F9",color:"#334155",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"},onClick:()=>setShowImport(true)},"📋 Import"),
          e("button",{style:{padding:"8px 12px",background:"#2563EB",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"},onClick:()=>setShowAddProject(true)},"+ New")
        )
      ),
      activeProjects.length===0&&e("div",{style:{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}},
        e("p",{style:{fontSize:15}},"No projects yet."),
        e("p",{style:{fontSize:13,marginTop:6}},"Tap + New to get started.")
      ),
      e(DragList,{
        items:activeProjects,
        getId:p=>p.id,
        onReorder:reorderProjects,
        renderItem:(p,arrowControls)=>{
          const pt=data.tasks.filter(t=>t.projectId===p.id);
          const pri=pt.filter(t=>t.priority&&!t.done).length;
          const done=pt.filter(t=>t.done).length;
          const isEditing = editingProjectId===p.id;
          return e("div",{key:p.id,style:{display:"flex",alignItems:"center",gap:8,background:"#fff",border:"1px solid #E2E8F0",borderLeft:`4px solid ${p.color}`,borderRadius:8,padding:"12px 14px",marginBottom:8}},
            arrowControls,
            e("div",{style:{flex:1,minWidth:0}},
              isEditing
                ? e("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                    e("input",{style:{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid #2563EB",fontSize:14,boxSizing:"border-box"},value:editingProjectName,autoFocus:true,
                      onChange:ev=>setEditingProjectName(ev.target.value),
                      onKeyDown:ev=>{ if(ev.key==="Enter")renameProject(p.id,editingProjectName); if(ev.key==="Escape"){setEditingProjectId(null);setEditingProjectName("");} }
                    }),
                    e("button",{style:{padding:"6px 10px",background:"#2563EB",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"},onClick:()=>renameProject(p.id,editingProjectName)},"Save"),
                    e("button",{style:{padding:"6px 10px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"},onClick:()=>{setEditingProjectId(null);setEditingProjectName("");}},"Cancel")
                  )
                : e("div",{style:{cursor:"pointer"},onClick:()=>setView(p.id)},
                    e("div",{style:{fontSize:15,fontWeight:600,color:"#1E293B",marginBottom:4}},p.name),
                    e("div",{style:{display:"flex",gap:10,fontSize:12,color:"#64748B",flexWrap:"wrap"}},
                      e("span",null,pt.length+" tasks"),
                      e("span",null,done+" done"),
                      pri>0&&e("span",{style:{color:"#F59E0B",fontWeight:600}},"★ "+pri+" Front Burner")
                    )
                  )
            ),
            !isEditing&&e("div",{style:{display:"flex",flexDirection:"column",gap:4,flexShrink:0}},
              e("button",{style:{padding:"4px 8px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:6,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"},
                onClick:()=>{setEditingProjectId(p.id);setEditingProjectName(p.name);}},"✏️ Rename"),
              e("button",{style:{padding:"4px 8px",background:"#FEF9EC",color:"#92400E",border:"none",borderRadius:6,fontSize:11,cursor:"pointer"},
                onClick:()=>{ if(confirm("Archive this project? You can unarchive it later."))archiveProject(p.id); }},"📦 Archive")
            )
          );
        }
      }),
      archivedProjects.length>0&&e("details",{style:{marginTop:20}},
        e("summary",{style:{fontSize:13,color:"#94A3B8",cursor:"pointer",padding:"8px 0",fontWeight:600}},"📦 Archived Projects ("+archivedProjects.length+")"),
        e("div",{style:{marginTop:8}},
          archivedProjects.map(p=>e("div",{key:p.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,background:"#F8FAFC",border:"1px solid #E2E8F0",borderLeft:`4px solid ${p.color}`,borderRadius:8,padding:"12px 14px",marginBottom:8,opacity:0.7}},
            e("div",null,
              e("div",{style:{fontSize:14,fontWeight:600,color:"#475569"}},p.name),
              e("div",{style:{fontSize:12,color:"#94A3B8",marginTop:2}},data.tasks.filter(t=>t.projectId===p.id).length+" tasks")
            ),
            e("div",{style:{display:"flex",gap:6}},
              e("button",{style:{padding:"4px 10px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:6,fontSize:12,cursor:"pointer"},onClick:()=>unarchiveProject(p.id)},"Restore"),
              e("button",{style:{padding:"4px 10px",background:"#FEF2F2",color:"#DC2626",border:"none",borderRadius:6,fontSize:12,cursor:"pointer"},onClick:()=>{if(confirm("Permanently delete this project and all its tasks?"))deleteProject(p.id);}},"Delete")
            )
          ))
        )
      )
    );

  // ── Individual project view ──────────────────────────────────────────────
  } else {
    const proj=projectMap[view];
    if(!proj){ mainContent=e("div",{style:{padding:16}},"Project not found."); }
    else{
      const tasks=data.tasks.filter(t=>t.projectId===view);
      const open=tasks.filter(t=>!t.done).sort((a,b)=>(a.order||0)-(b.order||0));
      const closed=tasks.filter(t=>t.done).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
      mainContent=e("div",{style:{padding:"16px"}},
        e("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#64748B",fontSize:14,padding:"0 0 12px 0"},onClick:()=>setView("projects")},"← Projects"),
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("div",{style:{width:14,height:14,borderRadius:"50%",background:proj.color,flexShrink:0}}),
            e("div",null,
              e("h2",{style:{fontSize:20,fontWeight:700,margin:0,color:"#0F172A"}},proj.name),
              e("p",{style:{fontSize:13,color:"#64748B"}},open.length+" open · "+closed.length+" done")
            )
          )
        ),
        e(AddTaskBar,{projectId:view}),
        e("div",{style:{marginTop:12}},
          e(DragList,{items:open,getId:t=>t.id,onReorder:(newIds)=>reorderProjectTasks(view,newIds),renderItem:(t,ac)=>e(TaskRow,{key:t.id,task:t,arrowControls:ac})})
        ),
        open.length===0&&e("p",{style:{color:"#94A3B8",textAlign:"center",padding:"20px 0",fontSize:14}},"No open tasks. Add one above."),
        closed.length>0&&e("details",{style:{marginTop:20}},
          e("summary",{style:{fontSize:13,color:"#94A3B8",cursor:"pointer",padding:"8px 0"}},"Completed ("+closed.length+")"),
          e("div",{style:{marginTop:8}},closed.map(t=>e(TaskRow,{key:t.id,task:t})))
        )
      );
    }
  }

  // ── Edit task modal ──────────────────────────────────────────────────────
  const modal = modalTask&&e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:100,padding:"12px",overflowY:"auto"},onClick:ev=>ev.target===ev.currentTarget&&setModalTask(null)},
    e("div",{style:{background:"#fff",borderRadius:12,padding:16,width:"100%",maxWidth:560,boxShadow:"0 20px 60px rgba(0,0,0,.2)",marginTop:16}},
      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
        e("h3",{style:{fontSize:16,fontWeight:700,margin:0}},"Edit Task"),
        e("button",{style:{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94A3B8",padding:0,lineHeight:1},onClick:()=>setModalTask(null)},"×")
      ),
      // Task label + input on one line
      e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
        e("label",{style:{fontSize:13,fontWeight:600,color:"#64748B",whiteSpace:"nowrap",width:52,flexShrink:0}},"Task"),
        e("input",{style:{flex:1,padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:14,boxSizing:"border-box"},value:modalTask.text,
          onChange:ev=>{const updated={...modalTask,text:ev.target.value};setModalTask(updated);saveTask(updated);}})
      ),
      // Project + Front Burner checkbox on one line
      e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
        e("label",{style:{fontSize:13,fontWeight:600,color:"#64748B",whiteSpace:"nowrap",width:52,flexShrink:0}},"Project"),
        e("select",{style:{flex:1,padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:14,boxSizing:"border-box"},value:modalTask.projectId,
          onChange:ev=>{const updated={...modalTask,projectId:ev.target.value};setModalTask(updated);saveTask(updated);}},
          data.projects.map(p=>e("option",{key:p.id,value:p.id},p.name))
        ),
        e("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:13,color:"#64748B",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}},
          e("input",{type:"checkbox",checked:modalTask.priority,
            onChange:ev=>{const updated={...modalTask,priority:ev.target.checked};setModalTask(updated);saveTask(updated);}}),
          "★ FB"
        )
      ),
      // Notes label above, large textarea
      e("label",{style:{display:"block",fontSize:13,fontWeight:600,color:"#64748B",marginBottom:4}},"Notes"),
      e("textarea",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:14,boxSizing:"border-box",height:"min(50vh, 320px)",resize:"vertical",fontFamily:"inherit",lineHeight:1.5},value:modalTask.notes,
        placeholder:"Add any notes, details, or context…",
        onChange:ev=>{const updated={...modalTask,notes:ev.target.value};setModalTask(updated);saveTask(updated);}}),
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}},
        e("button",{style:{padding:"8px 14px",background:"#FEF2F2",color:"#DC2626",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"},onClick:()=>{if(confirm("Delete this task?"))deleteTask(modalTask.id);}},"Delete"),
        e("button",{style:{padding:"8px 18px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"},onClick:()=>setModalTask(null)},"Close")
      )
    )
  );

  // ── Add project modal ────────────────────────────────────────────────────
  const addProjectModal = showAddProject&&e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16},onClick:ev=>ev.target===ev.currentTarget&&setShowAddProject(false)},
    e("div",{style:{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}},
      e("h3",{style:{fontSize:16,fontWeight:700,margin:"0 0 16px"}},"New Project"),
      e("label",{style:{display:"block",fontSize:12,fontWeight:600,color:"#64748B",marginBottom:4}},"Project Name"),
      e("input",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,boxSizing:"border-box"},placeholder:"e.g. Agarwal Kitchen Remodel",value:newProjectName,onChange:ev=>setNewProjectName(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&addProject(newProjectName),autoFocus:true}),
      e("div",{style:{display:"flex",justifyContent:"flex-end",gap:8,marginTop:20}},
        e("button",{style:{padding:"10px 14px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,fontSize:14,cursor:"pointer"},onClick:()=>setShowAddProject(false)},"Cancel"),
        e("button",{style:{padding:"10px 18px",background:"#2563EB",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"},onClick:()=>addProject(newProjectName)},"Create")
      )
    )
  );

  // ── Import plan modal ────────────────────────────────────────────────────
  const importModal = showImport&&e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16},onClick:ev=>ev.target===ev.currentTarget&&setShowImport(false)},
    e("div",{style:{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:520,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}},
      e("h3",{style:{fontSize:16,fontWeight:700,margin:"0 0 8px"}},"Import Project Plan"),
      e("p",{style:{fontSize:13,color:"#64748B",margin:"0 0 16px"}},"Paste a task list from Claude. One task per line. Mark priority with (priority) or ★."),
      e("label",{style:{display:"block",fontSize:12,fontWeight:600,color:"#64748B",marginBottom:4}},"Project Name"),
      e("input",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,boxSizing:"border-box"},placeholder:"Type existing or new project name",value:importProjectName,onChange:ev=>setImportProjectName(ev.target.value)}),
      e("label",{style:{display:"block",fontSize:12,fontWeight:600,color:"#64748B",margin:"12px 0 4px"}},"Tasks (one per line)"),
      e("textarea",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:14,boxSizing:"border-box",height:160,resize:"vertical",fontFamily:"inherit"},placeholder:"Submit permit application\nOrder materials\n★ Call client to confirm start date (priority)",value:importText,onChange:ev=>setImportText(ev.target.value)}),
      e("div",{style:{display:"flex",justifyContent:"flex-end",gap:8,marginTop:20}},
        e("button",{style:{padding:"10px 14px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,fontSize:14,cursor:"pointer"},onClick:()=>setShowImport(false)},"Cancel"),
        e("button",{style:{padding:"10px 18px",background:"#2563EB",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"},onClick:()=>importTasks(importProjectName,importText)},"Import")
      )
    )
  );

  return e("div",null, topNav, mainContent, modal, addProjectModal, importModal);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
