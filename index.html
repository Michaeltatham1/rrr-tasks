  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;


// ── Google Drive config ──────────────────────────────────────────────────────
const CLIENT_ID = "610736844681-t0p32thbogua2rtuvn7niavpnnukjbd3.apps.googleusercontent.com";
const FILE_NAME = "rrr_project_tasks.json";
const SCOPES = "https://www.googleapis.com/auth/drive.file";

// ── Palette & helpers ────────────────────────────────────────────────────────
const PROJECT_COLORS = [
  "#2563EB","#16A34A","#DC2626","#D97706","#7C3AED",
  "#0891B2","#DB2777","#65A30D","#EA580C","#4F46E5"
];

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

// ── Initial demo data ────────────────────────────────────────────────────────
const DEMO = {
  projects: [
    { id: "p1", name: "SRFR Station 71 Trailer Remodel", color: "#2563EB", createdAt: today() },
    { id: "p2", name: "Trailer Roof Refinishing",        color: "#16A34A", createdAt: today() },
  ],
  tasks: [
    { id: "t1", projectId: "p1", text: "Finalize cover page dates with client",   priority: true,  done: false, notes: "", createdAt: today() },
    { id: "t2", projectId: "p1", text: "Submit permit application",                priority: false, done: false, notes: "", createdAt: today() },
    { id: "t3", projectId: "p1", text: "Order interior materials",                 priority: false, done: false, notes: "", createdAt: today() },
    { id: "t4", projectId: "p2", text: "Apply first coat RX-985 silicone coating", priority: true,  done: false, notes: "Use 3/4\" nap roller", createdAt: today() },
    { id: "t5", projectId: "p2", text: "Wire cup scrub remaining rust spots",      priority: false, done: false, notes: "", createdAt: today() },
  ],
};

// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [data, setData]           = useState(null);   // { projects, tasks }
  const [view, setView]           = useState("week"); // "week" | "projects" | projectId
  const [gapiReady, setGapiReady] = useState(false);
  const [signedIn, setSignedIn]   = useState(false);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | saving | saved | error
  const [modalTask, setModalTask] = useState(null);   // task being edited
  const [newTaskText, setNewTaskText]   = useState("");
  const [newTaskProject, setNewTaskProject] = useState("");
  const [showAddProject, setShowAddProject] = useState(false);
  const [newProjectName, setNewProjectName] = useState("");
  const [fileId, setFileId]       = useState(null);
  const saveTimer                 = useRef(null);
  const tokenClient               = useRef(null);

  // ── Load Google Identity Services ──────────────────────────────────────────
  useEffect(() => {
    function initGoogle() {
      tokenClient.current = window.google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => {
          if (resp.error) { console.error(resp); return; }
          setSignedIn(true);
          loadFromDrive();
        },
      });
      setGapiReady(true);
    }

    if (window.google && window.google.accounts) {
      initGoogle();
    } else {
      window.addEventListener('google-ready', initGoogle, { once: true });
    }
  }, []);

  // ── Drive helpers ──────────────────────────────────────────────────────────
  async function findFile() {
    const res = await window.gapi.client.request({
      path: "https://www.googleapis.com/drive/v3/files",
      params: { q: `name='${FILE_NAME}' and trashed=false`, fields: "files(id)" },
    });
    return res.result.files?.[0]?.id || null;
  }

  async function loadFromDrive() {
    try {
      setSyncStatus("saving");
      const id = await findFile();
      if (!id) {
        // First run — seed with demo data
        setData(DEMO);
        setNewTaskProject(DEMO.projects[0]?.id || "");
        await createFile(DEMO);
        setSyncStatus("saved");
        return;
      }
      setFileId(id);
      const res = await window.gapi.client.request({
        path: `https://www.googleapis.com/drive/v3/files/${id}`,
        params: { alt: "media" },
      });
      const parsed = typeof res.result === "string" ? JSON.parse(res.result) : res.result;
      setData(parsed);
      setNewTaskProject(parsed.projects[0]?.id || "");
      setSyncStatus("saved");
    } catch (e) {
      console.error(e);
      setSyncStatus("error");
      setData(DEMO);
    }
  }

  async function createFile(payload) {
    const boundary = "rrr_boundary";
    const meta = JSON.stringify({ name: FILE_NAME, mimeType: "application/json" });
    const body = [
      `--${boundary}`,
      "Content-Type: application/json; charset=UTF-8",
      "",
      meta,
      `--${boundary}`,
      "Content-Type: application/json",
      "",
      JSON.stringify(payload),
      `--${boundary}--`,
    ].join("\r\n");

    const res = await window.gapi.client.request({
      path: "https://www.googleapis.com/upload/drive/v3/files",
      method: "POST",
      params: { uploadType: "multipart" },
      headers: { "Content-Type": `multipart/related; boundary=${boundary}` },
      body,
    });
    setFileId(res.result.id);
  }

  async function saveFile(payload, id) {
    await window.gapi.client.request({
      path: `https://www.googleapis.com/upload/drive/v3/files/${id}`,
      method: "PATCH",
      params: { uploadType: "media" },
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
  }

  // ── Auto-save whenever data changes ───────────────────────────────────────
  const scheduleSave = useCallback((payload) => {
    if (!signedIn) return;
    clearTimeout(saveTimer.current);
    setSyncStatus("saving");
    saveTimer.current = setTimeout(async () => {
      try {
        const id = fileId || await findFile();
        if (id) {
          await saveFile(payload, id);
          if (!fileId) setFileId(id);
        } else {
          await createFile(payload);
        }
        setSyncStatus("saved");
      } catch (e) {
        console.error(e);
        setSyncStatus("error");
      }
    }, 1200);
  }, [signedIn, fileId]);

  function updateData(fn) {
    setData(prev => {
      const next = fn(prev);
      scheduleSave(next);
      return next;
    });
  }

  // ── Task CRUD ──────────────────────────────────────────────────────────────
  function addTask(projectId, text, asPriority = false) {
    if (!text.trim() || !projectId) return;
    const task = { id: uid(), projectId, text: text.trim(), priority: asPriority, done: false, notes: "", createdAt: today() };
    updateData(d => ({ ...d, tasks: [...d.tasks, task] }));
  }

  function toggleDone(id) {
    updateData(d => ({ ...d, tasks: d.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t) }));
  }

  function togglePriority(id) {
    updateData(d => ({ ...d, tasks: d.tasks.map(t => t.id === id ? { ...t, priority: !t.priority } : t) }));
  }

  function saveTask(updated) {
    updateData(d => ({ ...d, tasks: d.tasks.map(t => t.id === updated.id ? updated : t) }));
    setModalTask(null);
  }

  function deleteTask(id) {
    updateData(d => ({ ...d, tasks: d.tasks.filter(t => t.id !== id) }));
    setModalTask(null);
  }

  function addProject(name) {
    if (!name.trim()) return;
    const p = { id: uid(), name: name.trim(), color: PROJECT_COLORS[data.projects.length % PROJECT_COLORS.length], createdAt: today() };
    updateData(d => ({ ...d, projects: [...d.projects, p] }));
    setShowAddProject(false);
    setNewProjectName("");
    setView(p.id);
  }

  // ── Derived ────────────────────────────────────────────────────────────────
  const priorityTasks = data ? data.tasks.filter(t => t.priority && !t.done) : [];
  const projectMap    = data ? Object.fromEntries(data.projects.map(p => [p.id, p])) : {};

  // ── Sign-in screen ─────────────────────────────────────────────────────────
  if (!signedIn) {
    return (
      <div style={styles.centerScreen}>
        <div style={styles.loginCard}>
          <div style={styles.logoMark}>RRR</div>
          <h1 style={styles.loginTitle}>Project Task Manager</h1>
          <p style={styles.loginSub}>Renewal Remodeling & Repairs</p>
          <p style={styles.loginDesc}>
            Sign in with your Google account to load and sync your projects across all devices.
          </p>
          <button
            style={styles.googleBtn}
            onClick={() => gapiReady && tokenClient.current?.requestAccessToken()}
          >
            <svg width="18" height="18" viewBox="0 0 18 18" style={{ marginRight: 8 }}>
              <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
              <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
              <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
            </svg>
            Sign in with Google
          </button>
          <p style={{ fontSize: 11, color: "#94A3B8", marginTop: 16, textAlign: "center" }}>
            Data saves to michaeltatham1@gmail.com Drive
          </p>
        </div>
      </div>
    );
  }

  if (!data) {
    return <div style={styles.centerScreen}><div style={styles.spinner} /><p style={{ color: "#64748B", marginTop: 16 }}>Loading your projects…</p></div>;
  }

  // ── Task row component ─────────────────────────────────────────────────────
  function TaskRow({ task, showProject = false }) {
    const proj = projectMap[task.projectId];
    return (
      <div style={{ ...styles.taskRow, opacity: task.done ? 0.45 : 1 }}>
        <button style={styles.checkBtn} onClick={() => toggleDone(task.id)}>
          <div style={{ ...styles.checkbox, background: task.done ? "#2563EB" : "transparent", borderColor: task.done ? "#2563EB" : "#CBD5E1" }}>
            {task.done && <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
        </button>
        <div style={{ flex: 1, minWidth: 0 }} onClick={() => setModalTask({ ...task })}>
          <div style={{ ...styles.taskText, textDecoration: task.done ? "line-through" : "none" }}>{task.text}</div>
          {showProject && proj && (
            <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: proj.color }} />
              <span style={styles.taskMeta}>{proj.name}</span>
            </div>
          )}
          {task.notes && <div style={styles.taskNotes}>{task.notes}</div>}
        </div>
        <button
          style={{ ...styles.starBtn, color: task.priority ? "#F59E0B" : "#CBD5E1" }}
          onClick={() => togglePriority(task.id)}
          title={task.priority ? "Remove from This Week" : "Add to This Week"}
        >★</button>
      </div>
    );
  }

  // ── Add task bar ───────────────────────────────────────────────────────────
  function AddTaskBar({ defaultProjectId, asPriority = false }) {
    const [text, setText] = useState("");
    const [projId, setProjId] = useState(defaultProjectId || data.projects[0]?.id || "");

    function submit() {
      if (!text.trim()) return;
      addTask(projId, text, asPriority);
      setText("");
    }

    return (
      <div style={styles.addBar}>
        <input
          style={styles.addInput}
          placeholder="Add task…"
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => e.key === "Enter" && submit()}
        />
        {asPriority && (
          <select style={styles.projSelect} value={projId} onChange={e => setProjId(e.target.value)}>
            {data.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        )}
        <button style={styles.addBtn} onClick={submit}>+ Add</button>
      </div>
    );
  }

  // ── Views ──────────────────────────────────────────────────────────────────
  function WeekView() {
    return (
      <div>
        <div style={styles.viewHeader}>
          <div>
            <h2 style={styles.viewTitle}>This Week</h2>
            <p style={styles.viewSub}>{priorityTasks.length} priority task{priorityTasks.length !== 1 ? "s" : ""} across {new Set(priorityTasks.map(t => t.projectId)).size} project{new Set(priorityTasks.map(t => t.projectId)).size !== 1 ? "s" : ""}</p>
          </div>
        </div>
        {priorityTasks.length === 0 ? (
          <div style={styles.empty}>
            <div style={styles.emptyIcon}>★</div>
            <p style={styles.emptyText}>No priority tasks yet.</p>
            <p style={styles.emptySub}>Star any task on a project page, or add one below.</p>
          </div>
        ) : (
          <div style={styles.taskList}>
            {priorityTasks.map(t => <TaskRow key={t.id} task={t} showProject />)}
          </div>
        )}
        <AddTaskBar asPriority />
      </div>
    );
  }

  function ProjectsView() {
    return (
      <div>
        <div style={styles.viewHeader}>
          <h2 style={styles.viewTitle}>All Projects</h2>
        </div>
        <div style={styles.projectGrid}>
          {data.projects.map(p => {
            const ptasks = data.tasks.filter(t => t.projectId === p.id);
            const done   = ptasks.filter(t => t.done).length;
            const pri    = ptasks.filter(t => t.priority && !t.done).length;
            return (
              <div key={p.id} style={{ ...styles.projectCard, borderTopColor: p.color }} onClick={() => setView(p.id)}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: p.color, flexShrink: 0 }} />
                  <span style={styles.projectCardName}>{p.name}</span>
                </div>
                <div style={styles.projectCardStats}>
                  <span>{ptasks.length} tasks</span>
                  <span>{done} done</span>
                  {pri > 0 && <span style={{ color: "#F59E0B" }}>★ {pri} this week</span>}
                </div>
              </div>
            );
          })}
          <div style={{ ...styles.projectCard, ...styles.addProjectCard }} onClick={() => setShowAddProject(true)}>
            <span style={styles.addProjectPlus}>+</span>
            <span style={styles.addProjectLabel}>New Project</span>
          </div>
        </div>
      </div>
    );
  }

  function ProjectView({ projectId }) {
    const proj   = projectMap[projectId];
    const tasks  = data.tasks.filter(t => t.projectId === projectId);
    const open   = tasks.filter(t => !t.done);
    const closed = tasks.filter(t => t.done);

    if (!proj) return <div style={{ padding: 24 }}>Project not found.</div>;

    return (
      <div>
        <div style={styles.viewHeader}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 14, height: 14, borderRadius: "50%", background: proj.color }} />
            <div>
              <h2 style={styles.viewTitle}>{proj.name}</h2>
              <p style={styles.viewSub}>{open.length} open · {closed.length} done</p>
            </div>
          </div>
        </div>
        <div style={styles.taskList}>
          {open.map(t => <TaskRow key={t.id} task={t} />)}
        </div>
        {open.length === 0 && (
          <div style={styles.empty}>
            <p style={styles.emptyText}>No open tasks.</p>
            <p style={styles.emptySub}>Add one below or star tasks to surface them in This Week.</p>
          </div>
        )}
        <AddTaskBar defaultProjectId={projectId} />
        {closed.length > 0 && (
          <details style={{ marginTop: 24 }}>
            <summary style={styles.completedToggle}>Completed ({closed.length})</summary>
            <div style={{ ...styles.taskList, marginTop: 8 }}>
              {closed.map(t => <TaskRow key={t.id} task={t} />)}
            </div>
          </details>
        )}
      </div>
    );
  }

  // ── Task edit modal ────────────────────────────────────────────────────────
  function TaskModal() {
    const [t, setT] = useState(modalTask);
    if (!t) return null;
    return (
      <div style={styles.overlay} onClick={e => e.target === e.currentTarget && setModalTask(null)}>
        <div style={styles.modal}>
          <h3 style={styles.modalTitle}>Edit Task</h3>
          <label style={styles.label}>Task</label>
          <input style={styles.modalInput} value={t.text} onChange={e => setT({ ...t, text: e.target.value })} />
          <label style={styles.label}>Project</label>
          <select style={styles.modalInput} value={t.projectId} onChange={e => setT({ ...t, projectId: e.target.value })}>
            {data.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <label style={styles.label}>Notes</label>
          <textarea style={{ ...styles.modalInput, height: 72, resize: "vertical" }} value={t.notes} onChange={e => setT({ ...t, notes: e.target.value })} />
          <label style={{ ...styles.label, display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
            <input type="checkbox" checked={t.priority} onChange={e => setT({ ...t, priority: e.target.checked })} />
            ★ Include in This Week
          </label>
          <div style={styles.modalActions}>
            <button style={styles.deleteBtn} onClick={() => { if (confirm("Delete this task?")) deleteTask(t.id); }}>Delete</button>
            <div style={{ display: "flex", gap: 8 }}>
              <button style={styles.cancelBtn} onClick={() => setModalTask(null)}>Cancel</button>
              <button style={styles.saveBtn} onClick={() => saveTask(t)}>Save</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Sync badge ─────────────────────────────────────────────────────────────
  const syncLabel = { idle: "", saving: "Saving…", saved: "Saved ✓", error: "Save failed" }[syncStatus];
  const syncColor = { idle: "#94A3B8", saving: "#F59E0B", saved: "#16A34A", error: "#DC2626" }[syncStatus];

  // ── Layout ─────────────────────────────────────────────────────────────────
  return (
    <div style={styles.root}>
      {/* Sidebar */}
      <aside style={styles.sidebar}>
        <div style={styles.sidebarTop}>
          <div style={styles.brandMark}>RRR</div>
          <div style={styles.brandSub}>Task Manager</div>
        </div>

        <nav style={styles.nav}>
          <button style={{ ...styles.navItem, ...(view === "week" ? styles.navActive : {}) }} onClick={() => setView("week")}>
            <span style={styles.navIcon}>★</span> This Week
            {priorityTasks.length > 0 && <span style={styles.badge}>{priorityTasks.length}</span>}
          </button>
          <button style={{ ...styles.navItem, ...(view === "projects" ? styles.navActive : {}) }} onClick={() => setView("projects")}>
            <span style={styles.navIcon}>⊞</span> All Projects
          </button>

          <div style={styles.navDivider}>PROJECTS</div>

          {data.projects.map(p => (
            <button
              key={p.id}
              style={{ ...styles.navItem, ...(view === p.id ? styles.navActive : {}) }}
              onClick={() => setView(p.id)}
            >
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: p.color, flexShrink: 0 }} />
              <span style={{ flex: 1, textAlign: "left", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
            </button>
          ))}

          <button style={styles.newProjectBtn} onClick={() => setShowAddProject(true)}>+ New Project</button>
        </nav>

        <div style={styles.sidebarBottom}>
          <div style={{ color: syncColor, fontSize: 11 }}>{syncLabel}</div>
          <div style={{ color: "#64748B", fontSize: 10, marginTop: 2 }}>michaeltatham1@gmail.com</div>
        </div>
      </aside>

      {/* Main */}
      <main style={styles.main}>
        {view === "week"     && <WeekView />}
        {view === "projects" && <ProjectsView />}
        {view !== "week" && view !== "projects" && <ProjectView projectId={view} />}
      </main>

      {/* Modals */}
      {modalTask && <TaskModal />}

      {showAddProject && (
        <div style={styles.overlay} onClick={e => e.target === e.currentTarget && setShowAddProject(false)}>
          <div style={{ ...styles.modal, maxWidth: 400 }}>
            <h3 style={styles.modalTitle}>New Project</h3>
            <label style={styles.label}>Project Name</label>
            <input
              style={styles.modalInput}
              placeholder="e.g. Agarwal Kitchen Remodel"
              value={newProjectName}
              onChange={e => setNewProjectName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addProject(newProjectName)}
              autoFocus
            />
            <div style={styles.modalActions}>
              <div />
              <div style={{ display: "flex", gap: 8 }}>
                <button style={styles.cancelBtn} onClick={() => setShowAddProject(false)}>Cancel</button>
                <button style={styles.saveBtn} onClick={() => addProject(newProjectName)}>Create</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Styles ─────────────────────────────────────────────────────────────────
const styles = {
  root: { display: "flex", height: "100vh", fontFamily: "'Inter', system-ui, sans-serif", background: "#F8FAFC", color: "#1E293B" },

  // Sidebar
  sidebar: { width: 220, background: "#0F172A", display: "flex", flexDirection: "column", flexShrink: 0, overflowY: "auto" },
  sidebarTop: { padding: "20px 16px 12px" },
  brandMark: { fontSize: 18, fontWeight: 800, color: "#2563EB", letterSpacing: 1 },
  brandSub: { fontSize: 10, color: "#475569", letterSpacing: 1, textTransform: "uppercase", marginTop: 2 },
  nav: { flex: 1, padding: "4px 8px" },
  navItem: { display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "7px 10px", borderRadius: 6, border: "none", background: "transparent", color: "#94A3B8", fontSize: 13, cursor: "pointer", textAlign: "left" },
  navActive: { background: "#1E293B", color: "#F1F5F9" },
  navIcon: { fontSize: 14, flexShrink: 0 },
  navDivider: { fontSize: 9, color: "#334155", letterSpacing: 1.5, textTransform: "uppercase", padding: "16px 10px 6px" },
  badge: { marginLeft: "auto", background: "#2563EB", color: "#fff", fontSize: 10, fontWeight: 700, borderRadius: 10, padding: "1px 6px" },
  newProjectBtn: { display: "block", width: "100%", marginTop: 8, padding: "7px 10px", borderRadius: 6, border: "1px dashed #334155", background: "transparent", color: "#475569", fontSize: 12, cursor: "pointer", textAlign: "left" },
  sidebarBottom: { padding: "12px 16px", borderTop: "1px solid #1E293B" },

  // Main
  main: { flex: 1, overflowY: "auto", padding: "24px 28px" },
  viewHeader: { marginBottom: 20 },
  viewTitle: { fontSize: 22, fontWeight: 700, margin: 0, color: "#0F172A" },
  viewSub: { fontSize: 13, color: "#64748B", margin: "4px 0 0" },

  // Tasks
  taskList: { display: "flex", flexDirection: "column", gap: 1 },
  taskRow: { display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 12px", background: "#fff", borderRadius: 8, border: "1px solid #E2E8F0", cursor: "pointer", transition: "border-color .15s" },
  checkBtn: { background: "none", border: "none", cursor: "pointer", padding: 0, marginTop: 2, flexShrink: 0 },
  checkbox: { width: 16, height: 16, borderRadius: 4, border: "2px solid", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" },
  taskText: { fontSize: 14, color: "#1E293B", lineHeight: 1.4 },
  taskMeta: { fontSize: 11, color: "#94A3B8" },
  taskNotes: { fontSize: 11, color: "#64748B", marginTop: 2 },
  starBtn: { background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: "0 2px", flexShrink: 0, lineHeight: 1 },

  // Add bar
  addBar: { display: "flex", gap: 8, marginTop: 12 },
  addInput: { flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid #E2E8F0", fontSize: 14, background: "#fff", outline: "none" },
  projSelect: { padding: "8px 10px", borderRadius: 8, border: "1px solid #E2E8F0", fontSize: 13, background: "#fff", color: "#334155", maxWidth: 180 },
  addBtn: { padding: "8px 14px", borderRadius: 8, background: "#2563EB", color: "#fff", border: "none", fontSize: 13, fontWeight: 600, cursor: "pointer" },

  // Projects grid
  projectGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 },
  projectCard: { background: "#fff", border: "1px solid #E2E8F0", borderTop: "3px solid #ccc", borderRadius: 8, padding: "14px 16px", cursor: "pointer" },
  projectCardName: { fontSize: 14, fontWeight: 600, color: "#1E293B", lineHeight: 1.3 },
  projectCardStats: { display: "flex", gap: 10, marginTop: 8, fontSize: 12, color: "#64748B" },
  addProjectCard: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, background: "#F8FAFC", borderStyle: "dashed", borderTop: "1px dashed #CBD5E1", minHeight: 90 },
  addProjectPlus: { fontSize: 24, color: "#CBD5E1" },
  addProjectLabel: { fontSize: 13, color: "#94A3B8" },

  // Empty
  empty: { textAlign: "center", padding: "40px 20px" },
  emptyIcon: { fontSize: 32, color: "#E2E8F0", marginBottom: 12 },
  emptyText: { fontSize: 15, color: "#64748B", margin: 0 },
  emptySub: { fontSize: 13, color: "#94A3B8", marginTop: 6 },

  // Completed
  completedToggle: { fontSize: 13, color: "#94A3B8", cursor: "pointer", userSelect: "none" },

  // Modal
  overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
  modal: { background: "#fff", borderRadius: 12, padding: 24, width: "90%", maxWidth: 480, boxShadow: "0 20px 60px rgba(0,0,0,.2)" },
  modalTitle: { fontSize: 16, fontWeight: 700, margin: "0 0 16px" },
  label: { display: "block", fontSize: 12, fontWeight: 600, color: "#64748B", marginBottom: 4, marginTop: 12 },
  modalInput: { width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #E2E8F0", fontSize: 14, boxSizing: "border-box", fontFamily: "inherit" },
  modalActions: { display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 20 },
  saveBtn: { padding: "8px 18px", background: "#2563EB", color: "#fff", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer" },
  cancelBtn: { padding: "8px 14px", background: "#F1F5F9", color: "#475569", border: "none", borderRadius: 8, fontSize: 13, cursor: "pointer" },
  deleteBtn: { padding: "8px 14px", background: "#FEF2F2", color: "#DC2626", border: "none", borderRadius: 8, fontSize: 13, cursor: "pointer" },

  // Login
  centerScreen: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: "#F8FAFC" },
  loginCard: { background: "#fff", borderRadius: 16, padding: 40, width: 340, boxShadow: "0 8px 40px rgba(0,0,0,.1)", display: "flex", flexDirection: "column", alignItems: "center" },
  logoMark: { fontSize: 28, fontWeight: 900, color: "#2563EB", letterSpacing: 2, marginBottom: 8 },
  loginTitle: { fontSize: 20, fontWeight: 700, margin: "0 0 4px", textAlign: "center" },
  loginSub: { fontSize: 13, color: "#64748B", margin: "0 0 16px", textAlign: "center" },
  loginDesc: { fontSize: 13, color: "#94A3B8", textAlign: "center", marginBottom: 20, lineHeight: 1.5 },
  googleBtn: { display: "flex", alignItems: "center", padding: "10px 20px", background: "#fff", border: "1px solid #E2E8F0", borderRadius: 8, fontSize: 14, fontWeight: 500, cursor: "pointer", boxShadow: "0 1px 4px rgba(0,0,0,.08)" },
  spinner: { width: 32, height: 32, border: "3px solid #E2E8F0", borderTopColor: "#2563EB", borderRadius: "50%", animation: "spin 0.8s linear infinite" },
};


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


</body></html>
