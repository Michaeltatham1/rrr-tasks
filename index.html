
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRR Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#F8FAFC;color:#1E293B}
    #root{min-height:100vh}
    @keyframes spin{to{transform:rotate(360deg)}}
    button:active{opacity:0.7}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script>
const e = React.createElement;
const CLIENT_ID = "610736844681-t0p32thbogua2rtuvn7niavpnnukjbd3.apps.googleusercontent.com";
const FILE_NAME = "rrr_project_tasks.json";
const SCOPES = "https://www.googleapis.com/auth/drive.file";
const COLORS = ["#2563EB","#16A34A","#DC2626","#D97706","#7C3AED","#0891B2","#DB2777","#65A30D","#EA580C","#4F46E5"];
function uid(){ return Math.random().toString(36).slice(2,10); }
function today(){ return new Date().toISOString().slice(0,10); }
const DEMO = {
  projects:[
    {id:"p1",name:"SRFR Station 71 Trailer Remodel",color:"#2563EB",createdAt:today()},
    {id:"p2",name:"Trailer Roof Refinishing",color:"#16A34A",createdAt:today()}
  ],
  tasks:[
    {id:"t1",projectId:"p1",text:"Finalize cover page dates with client",priority:true,done:false,notes:"",createdAt:today()},
    {id:"t2",projectId:"p1",text:"Submit permit application",priority:false,done:false,notes:"",createdAt:today()},
    {id:"t3",projectId:"p1",text:"Order interior materials",priority:false,done:false,notes:"",createdAt:today()},
    {id:"t4",projectId:"p2",text:"Apply first coat RX-985 silicone coating",priority:true,done:false,notes:"Use 3/4 nap roller",createdAt:today()},
    {id:"t5",projectId:"p2",text:"Wire cup scrub remaining rust spots",priority:false,done:false,notes:"",createdAt:today()}
  ]
};

function App(){
  const [data,setData] = React.useState(null);
  const [view,setView] = React.useState("week"); // "week" | "projects" | projectId
  const [gapiReady,setGapiReady] = React.useState(false);
  const [signedIn,setSignedIn] = React.useState(false);
  const [syncStatus,setSyncStatus] = React.useState("idle");
  const [modalTask,setModalTask] = React.useState(null);
  const [showAddProject,setShowAddProject] = React.useState(false);
  const [newProjectName,setNewProjectName] = React.useState("");
  const fileIdRef = React.useRef(null);
  const saveTimer = React.useRef(null);
  const tokenClient = React.useRef(null);

  // ── Google init ──────────────────────────────────────────────────────────
  React.useEffect(()=>{
    function initGapi(){ window.gapi.load("client",async()=>{ await window.gapi.client.init({}); }); }
    function initGoogle(){
      tokenClient.current = window.google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID, scope:SCOPES,
        callback:(resp)=>{ if(resp.error){console.error(resp);return;} setSignedIn(true); loadFromDrive(); }
      });
      setGapiReady(true);
    }
    const interval = setInterval(()=>{
      if(window.gapi && !window.gapi.client){ initGapi(); }
      if(window.gapi && window.gapi.client && window.google && window.google.accounts){ clearInterval(interval); initGoogle(); }
    },200);
    return ()=>clearInterval(interval);
  },[]);

  // ── Drive ────────────────────────────────────────────────────────────────
  async function findFile(){
    const res = await window.gapi.client.request({path:"https://www.googleapis.com/drive/v3/files",params:{q:`name='${FILE_NAME}' and trashed=false`,fields:"files(id)"}});
    return res.result.files?.[0]?.id||null;
  }
  async function loadFromDrive(){
    try{
      setSyncStatus("saving");
      const id = await findFile();
      if(!id){ setData(DEMO); await createDriveFile(DEMO); setSyncStatus("saved"); return; }
      fileIdRef.current=id;
      const res = await window.gapi.client.request({path:`https://www.googleapis.com/drive/v3/files/${id}`,params:{alt:"media"}});
      const parsed = typeof res.result==="string"?JSON.parse(res.result):res.result;
      setData(parsed); setSyncStatus("saved");
    }catch(err){ console.error(err); setSyncStatus("error"); setData(DEMO); }
  }
  async function createDriveFile(payload){
    const b="rrr_boundary";
    const body=[`--${b}`,"Content-Type: application/json; charset=UTF-8","",JSON.stringify({name:FILE_NAME,mimeType:"application/json"}),`--${b}`,"Content-Type: application/json","",JSON.stringify(payload),`--${b}--`].join("\r\n");
    const res = await window.gapi.client.request({path:"https://www.googleapis.com/upload/drive/v3/files",method:"POST",params:{uploadType:"multipart"},headers:{"Content-Type":`multipart/related; boundary=${b}`},body});
    fileIdRef.current=res.result.id;
  }
  async function saveDriveFile(payload){
    const id=fileIdRef.current||await findFile();
    if(!id){await createDriveFile(payload);return;}
    fileIdRef.current=id;
    await window.gapi.client.request({path:`https://www.googleapis.com/upload/drive/v3/files/${id}`,method:"PATCH",params:{uploadType:"media"},headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  }
  function updateData(fn){
    setData(prev=>{
      const next=fn(prev);
      if(signedIn){ clearTimeout(saveTimer.current); setSyncStatus("saving"); saveTimer.current=setTimeout(async()=>{ try{await saveDriveFile(next);setSyncStatus("saved");}catch(err){console.error(err);setSyncStatus("error");} },1200); }
      return next;
    });
  }

  // ── CRUD ─────────────────────────────────────────────────────────────────
  function addTask(projectId,text,asPriority=false){
    if(!text.trim()||!projectId)return;
    updateData(d=>({...d,tasks:[...d.tasks,{id:uid(),projectId,text:text.trim(),priority:asPriority,done:false,notes:"",createdAt:today()}]}));
  }
  function toggleDone(id){ updateData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,done:!t.done}:t)})); }
  function togglePriority(id){ updateData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,priority:!t.priority}:t)})); }
  function saveTask(updated){ updateData(d=>({...d,tasks:d.tasks.map(t=>t.id===updated.id?updated:t)})); setModalTask(null); }
  function deleteTask(id){ updateData(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id)})); setModalTask(null); }
  function addProject(name){
    if(!name.trim())return;
    const p={id:uid(),name:name.trim(),color:COLORS[data.projects.length%COLORS.length],createdAt:today()};
    updateData(d=>({...d,projects:[...d.projects,p]}));
    setShowAddProject(false); setNewProjectName(""); setView(p.id);
  }
  function deleteProject(id){
    updateData(d=>({projects:d.projects.filter(p=>p.id!==id),tasks:d.tasks.filter(t=>t.projectId!==id)}));
    setView("projects");
  }

  const projectMap = data?Object.fromEntries(data.projects.map(p=>[p.id,p])):{};
  const syncColor={idle:"#94A3B8",saving:"#F59E0B",saved:"#16A34A",error:"#DC2626"}[syncStatus];
  const syncLabel={idle:"",saving:"Saving…",saved:"Saved ✓",error:"Save failed"}[syncStatus];

  // ── Sign in screen ───────────────────────────────────────────────────────
  if(!signedIn){
    return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F8FAFC",padding:20}},
      e("div",{style:{background:"#fff",borderRadius:16,padding:40,width:"100%",maxWidth:340,boxShadow:"0 8px 40px rgba(0,0,0,.1)",display:"flex",flexDirection:"column",alignItems:"center"}},
        e("div",{style:{fontSize:28,fontWeight:900,color:"#2563EB",letterSpacing:2,marginBottom:8}},"RRR"),
        e("h1",{style:{fontSize:20,fontWeight:700,margin:"0 0 4px",textAlign:"center"}},"Project Task Manager"),
        e("p",{style:{fontSize:13,color:"#64748B",margin:"0 0 20px",textAlign:"center"}},"Renewal Remodeling & Repairs"),
        e("button",{
          style:{display:"flex",alignItems:"center",padding:"12px 24px",background:"#fff",border:"1px solid #E2E8F0",borderRadius:8,fontSize:15,fontWeight:500,cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,.08)"},
          onClick:()=>gapiReady&&tokenClient.current&&tokenClient.current.requestAccessToken()
        },
          e("svg",{width:20,height:20,viewBox:"0 0 18 18",style:{marginRight:10}},
            e("path",{fill:"#4285F4",d:"M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"}),
            e("path",{fill:"#34A853",d:"M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"}),
            e("path",{fill:"#FBBC05",d:"M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"}),
            e("path",{fill:"#EA4335",d:"M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"})
          ),
          "Sign in with Google"
        ),
        e("p",{style:{fontSize:11,color:"#94A3B8",marginTop:16}},"michaeltatham1@gmail.com")
      )
    );
  }

  if(!data){ return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}},"Loading…"); }

  // ── Task row ─────────────────────────────────────────────────────────────
  function TaskRow({task}){
    return e("div",{style:{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 14px",background:"#fff",borderRadius:8,border:"1px solid #E2E8F0",marginBottom:4,opacity:task.done?0.45:1}},
      e("button",{style:{background:"none",border:"none",cursor:"pointer",padding:0,marginTop:2,flexShrink:0},onClick:()=>toggleDone(task.id)},
        e("div",{style:{width:18,height:18,borderRadius:4,border:`2px solid ${task.done?"#2563EB":"#CBD5E1"}`,background:task.done?"#2563EB":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}},
          task.done&&e("svg",{width:10,height:8,viewBox:"0 0 10 8"},e("path",{d:"M1 4l3 3 5-6",stroke:"#fff",strokeWidth:1.8,fill:"none",strokeLinecap:"round",strokeLinejoin:"round"}))
        )
      ),
      e("div",{style:{flex:1,minWidth:0,cursor:"pointer"},onClick:()=>setModalTask({...task})},
        e("div",{style:{fontSize:15,color:"#1E293B",lineHeight:1.4,textDecoration:task.done?"line-through":"none"}},task.text),
        task.notes&&e("div",{style:{fontSize:12,color:"#64748B",marginTop:3}},task.notes)
      ),
      e("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:20,padding:"0 2px",flexShrink:0,color:task.priority?"#F59E0B":"#CBD5E1",lineHeight:1},onClick:()=>togglePriority(task.id)},"★")
    );
  }

  // ── Add task bar ─────────────────────────────────────────────────────────
  function AddTaskBar({projectId,asPriority=false}){
    const [text,setText]=React.useState("");
    const [selProj,setSelProj]=React.useState(projectId||data.projects[0]?.id||"");
    function submit(){ if(!text.trim())return; addTask(asPriority?selProj:projectId,text,asPriority); setText(""); }
    return e("div",{style:{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}},
      e("input",{style:{flex:1,minWidth:160,padding:"10px 12px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,background:"#fff",outline:"none"},placeholder:"Add task…",value:text,onChange:ev=>setText(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&submit()}),
      asPriority&&e("select",{style:{padding:"10px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:14,background:"#fff",color:"#334155",maxWidth:200},value:selProj,onChange:ev=>setSelProj(ev.target.value)},
        data.projects.map(p=>e("option",{key:p.id,value:p.id},p.name))
      ),
      e("button",{style:{padding:"10px 16px",borderRadius:8,background:"#2563EB",color:"#fff",border:"none",fontSize:14,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"},onClick:submit},"+ Add")
    );
  }

  // ── Top nav ──────────────────────────────────────────────────────────────
  const priorityCount = data.tasks.filter(t=>t.priority&&!t.done).length;
  const isProjectView = view!=="week"&&view!=="projects";
  const topNav = e("div",{style:{background:"#0F172A",padding:"0 16px",display:"flex",alignItems:"center",gap:4,position:"sticky",top:0,zIndex:10}},
    e("button",{style:{padding:"14px 16px",border:"none",background:"transparent",color:view==="week"?"#fff":"#64748B",fontSize:14,fontWeight:view==="week"?700:400,cursor:"pointer",borderBottom:view==="week"?"2px solid #2563EB":"2px solid transparent"},onClick:()=>setView("week")},
      "★ This Week"+(priorityCount>0?" ("+priorityCount+")":"")
    ),
    e("button",{style:{padding:"14px 16px",border:"none",background:"transparent",color:(view==="projects"||isProjectView)?"#fff":"#64748B",fontSize:14,fontWeight:(view==="projects"||isProjectView)?700:400,cursor:"pointer",borderBottom:(view==="projects"||isProjectView)?"2px solid #2563EB":"2px solid transparent"},onClick:()=>setView("projects")},
      "Projects"
    ),
    e("div",{style:{flex:1}}),
    e("span",{style:{fontSize:11,color:syncColor}},syncLabel)
  );

  // ── This Week view ───────────────────────────────────────────────────────
  let mainContent;
  if(view==="week"){
    const projectsWithPriority = data.projects.map(p=>({
      proj:p,
      tasks:data.tasks.filter(t=>t.projectId===p.id&&t.priority&&!t.done)
    })).filter(g=>g.tasks.length>0);

    mainContent = e("div",{style:{padding:"16px"}},
      e("h2",{style:{fontSize:20,fontWeight:700,color:"#0F172A",marginBottom:4}},"This Week"),
      e("p",{style:{fontSize:13,color:"#64748B",marginBottom:20}},priorityCount+" priority task"+(priorityCount!==1?"s":"")+" across "+projectsWithPriority.length+" project"+(projectsWithPriority.length!==1?"s":"")),

      priorityCount===0&&e("div",{style:{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}},
        e("div",{style:{fontSize:40,marginBottom:12}},"★"),
        e("p",{style:{fontSize:15}},"No priority tasks yet."),
        e("p",{style:{fontSize:13,marginTop:6}},"Star any task to add it here.")
      ),

      projectsWithPriority.map(({proj,tasks})=>
        e("div",{key:proj.id,style:{marginBottom:24}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
            e("div",{style:{width:10,height:10,borderRadius:"50%",background:proj.color}}),
            e("span",{style:{fontSize:13,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.5}}),
            e("span",{style:{fontSize:15,fontWeight:700,color:"#1E293B"}},proj.name)
          ),
          tasks.map(t=>e(TaskRow,{key:t.id,task:t}))
        )
      ),

      e("div",{style:{marginTop:24,paddingTop:16,borderTop:"1px solid #E2E8F0"}},
        e("p",{style:{fontSize:12,color:"#94A3B8",marginBottom:6}},"Add a priority task to a project:"),
        e(AddTaskBar,{asPriority:true})
      )
    );

  // ── Projects list view ───────────────────────────────────────────────────
  } else if(view==="projects"){
    mainContent = e("div",{style:{padding:"16px"}},
      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}},
        e("h2",{style:{fontSize:20,fontWeight:700,color:"#0F172A"}},"Projects"),
        e("button",{style:{padding:"8px 14px",background:"#2563EB",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"},onClick:()=>setShowAddProject(true)},"+ New Project")
      ),
      data.projects.length===0&&e("div",{style:{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}},
        e("p",{style:{fontSize:15}},"No projects yet."),
        e("p",{style:{fontSize:13,marginTop:6}},"Tap + New Project to get started.")
      ),
      data.projects.map(p=>{
        const pt=data.tasks.filter(t=>t.projectId===p.id);
        const pri=pt.filter(t=>t.priority&&!t.done).length;
        const done=pt.filter(t=>t.done).length;
        return e("div",{key:p.id,
          style:{background:"#fff",border:"1px solid #E2E8F0",borderLeft:`4px solid ${p.color}`,borderRadius:8,padding:"14px 16px",marginBottom:10,cursor:"pointer"},
          onClick:()=>setView(p.id)
        },
          e("div",{style:{fontSize:15,fontWeight:600,color:"#1E293B",marginBottom:6}},p.name),
          e("div",{style:{display:"flex",gap:12,fontSize:13,color:"#64748B"}},
            e("span",null,pt.length+" tasks"),
            e("span",null,done+" done"),
            pri>0&&e("span",{style:{color:"#F59E0B",fontWeight:600}},"★ "+pri+" this week")
          )
        );
      })
    );

  // ── Individual project view ──────────────────────────────────────────────
  } else {
    const proj=projectMap[view];
    if(!proj){ mainContent=e("div",{style:{padding:16}},"Project not found."); }
    else{
      const tasks=data.tasks.filter(t=>t.projectId===view);
      const open=tasks.filter(t=>!t.done);
      const closed=tasks.filter(t=>t.done);
      mainContent=e("div",{style:{padding:"16px"}},
        e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:6}},
          e("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#64748B",fontSize:14,padding:0},onClick:()=>setView("projects")},"← Projects"),
        ),
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,marginTop:8}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("div",{style:{width:14,height:14,borderRadius:"50%",background:proj.color,flexShrink:0}}),
            e("div",null,
              e("h2",{style:{fontSize:20,fontWeight:700,margin:0,color:"#0F172A"}},proj.name),
              e("p",{style:{fontSize:13,color:"#64748B"}},open.length+" open · "+closed.length+" done")
            )
          ),
          e("button",{
            style:{padding:"6px 12px",background:"#FEF2F2",color:"#DC2626",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"},
            onClick:()=>{ if(confirm("Delete project and all its tasks?"))deleteProject(proj.id); }
          },"Delete")
        ),
        open.map(t=>e(TaskRow,{key:t.id,task:t})),
        open.length===0&&e("p",{style:{color:"#94A3B8",textAlign:"center",padding:"20px 0",fontSize:14}},"No open tasks. Add one below."),
        e(AddTaskBar,{projectId:view}),
        closed.length>0&&e("details",{style:{marginTop:20}},
          e("summary",{style:{fontSize:13,color:"#94A3B8",cursor:"pointer",padding:"8px 0"}},"Completed ("+closed.length+")"),
          e("div",{style:{marginTop:8}},closed.map(t=>e(TaskRow,{key:t.id,task:t})))
        )
      );
    }
  }

  // ── Edit task modal ──────────────────────────────────────────────────────
  const modal = modalTask&&e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16},onClick:ev=>ev.target===ev.currentTarget&&setModalTask(null)},
    e("div",{style:{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:480,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}},
      e("h3",{style:{fontSize:16,fontWeight:700,margin:"0 0 16px"}},"Edit Task"),
      e("label",{style:{display:"block",fontSize:12,fontWeight:600,color:"#64748B",marginBottom:4}},"Task"),
      e("input",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,boxSizing:"border-box"},value:modalTask.text,onChange:ev=>setModalTask({...modalTask,text:ev.target.value})}),
      e("label",{style:{display:"block",fontSize:12,fontWeight:600,color:"#64748B",margin:"12px 0 4px"}},"Project"),
      e("select",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,boxSizing:"border-box"},value:modalTask.projectId,onChange:ev=>setModalTask({...modalTask,projectId:ev.target.value})},
        data.projects.map(p=>e("option",{key:p.id,value:p.id},p.name))
      ),
      e("label",{style:{display:"block",fontSize:12,fontWeight:600,color:"#64748B",margin:"12px 0 4px"}},"Notes"),
      e("textarea",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,boxSizing:"border-box",height:80,resize:"vertical",fontFamily:"inherit"},value:modalTask.notes,onChange:ev=>setModalTask({...modalTask,notes:ev.target.value})}),
      e("label",{style:{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#64748B",margin:"12px 0 0",cursor:"pointer"}},
        e("input",{type:"checkbox",checked:modalTask.priority,onChange:ev=>setModalTask({...modalTask,priority:ev.target.checked})}),
        "★ Include in This Week"
      ),
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:20}},
        e("button",{style:{padding:"10px 14px",background:"#FEF2F2",color:"#DC2626",border:"none",borderRadius:8,fontSize:14,cursor:"pointer"},onClick:()=>{if(confirm("Delete this task?"))deleteTask(modalTask.id);}},"Delete"),
        e("div",{style:{display:"flex",gap:8}},
          e("button",{style:{padding:"10px 14px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,fontSize:14,cursor:"pointer"},onClick:()=>setModalTask(null)},"Cancel"),
          e("button",{style:{padding:"10px 18px",background:"#2563EB",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"},onClick:()=>saveTask(modalTask)},"Save")
        )
      )
    )
  );

  // ── Add project modal ────────────────────────────────────────────────────
  const addProjectModal = showAddProject&&e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16},onClick:ev=>ev.target===ev.currentTarget&&setShowAddProject(false)},
    e("div",{style:{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}},
      e("h3",{style:{fontSize:16,fontWeight:700,margin:"0 0 16px"}},"New Project"),
      e("label",{style:{display:"block",fontSize:12,fontWeight:600,color:"#64748B",marginBottom:4}},"Project Name"),
      e("input",{style:{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:15,boxSizing:"border-box"},placeholder:"e.g. Agarwal Kitchen Remodel",value:newProjectName,onChange:ev=>setNewProjectName(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&addProject(newProjectName),autoFocus:true}),
      e("div",{style:{display:"flex",justifyContent:"flex-end",gap:8,marginTop:20}},
        e("button",{style:{padding:"10px 14px",background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,fontSize:14,cursor:"pointer"},onClick:()=>setShowAddProject(false)},"Cancel"),
        e("button",{style:{padding:"10px 18px",background:"#2563EB",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"},onClick:()=>addProject(newProjectName)},"Create")
      )
    )
  );

  return e("div",null, topNav, mainContent, modal, addProjectModal);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
